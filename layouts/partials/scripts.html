{{ $hoverintent := resources.Get "js/hoverintent.min.js" }}
<script defer src="{{ $hoverintent.RelPermalink }}"></script>

{{ $menu := resources.Get "js/menu.js" }}
{{ if hugo.IsProduction }}
{{ $menu = $menu | resources.Minify | resources.Fingerprint }}
<script defer src="{{ $menu.RelPermalink }}" integrity="{{ $menu.Data.Integrity }}" crossorigin="anonymous"></script>
{{ else }}
<script defer src="{{ $menu.RelPermalink }}"></script>
{{ end }}
