# Enforces the Developer Certificate of Origin required by CONTRIBUTING.md:
# every non-merge commit in a pull request must carry a Signed-off-by line.
name: DCO

on:
  pull_request:

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check sign-off
        shell: bash
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          while read -r sha; do
            [ -z "$sha" ] && continue
            if ! git show -s --format=%B "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $sha is missing a Signed-off-by line"
              missing=1
            fi
          done < <(git rev-list --no-merges "$base..$head")
          if [ "$missing" -ne 0 ]; then
            echo "All commits must be signed off (git commit -s). See CONTRIBUTING.md."
            exit 1
          fi
          echo "All commits are signed off."
